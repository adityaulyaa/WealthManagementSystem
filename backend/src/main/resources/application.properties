# =====================================================
# Wealth Management System - Application Configuration
# Spring Boot 3.x Configuration
# =====================================================

# =====================================================
# APPLICATION SETTINGS
# =====================================================
spring.application.name=wealth-management-backend
server.port=8080

# =====================================================
# DATABASE CONNECTION - MySQL
# =====================================================
# MySQL 8.0+ Connection
spring.datasource.url=jdbc:mysql://localhost:3306/wealth_management?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Kanjengmami100_

# MySQL Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP - default in Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# =====================================================
# JPA / HIBERNATE CONFIGURATION
# =====================================================
# Hibernate DDL Auto (create, create-drop, update, validate, none)
# MVP: validate (schema created manually via SQL script)
spring.jpa.hibernate.ddl-auto=none
spring.flyway.locations=classpath:db/migration


# Show SQL queries in console (Development only)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Hibernate Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Naming Strategy (snake_case in DB, camelCase in Java)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.hibernate.naming.implicit-strategy=org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy

# =====================================================
# LOGGING CONFIGURATION
# =====================================================
# Log levels
logging.level.root=INFO
logging.level.com.wealthmanagementsystem=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Log pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# =====================================================
# SPRING BOOT DEVTOOLS (Development)
# =====================================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# =====================================================
# ERROR HANDLING
# =====================================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# =====================================================
# JACKSON (JSON Serialization)
# =====================================================
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# =====================================================
# JWT CONFIGURATION
# =====================================================
# JWT secret key (change in production)
jwt.secret=wealth-management-system-super-secret-key-change-in-production

# JWT token expiration time in milliseconds (86400000 = 24 hours)
jwt.expiration=86400000

# =====================================================
# NOTES
# =====================================================
# 1. Database 'wealth_management' must be created manually
# 2. Schema created via database/schema/V1__create_tables.sql
# 3. Change spring.datasource.password before production
# 4. Set spring.jpa.show-sql=false in production
# 5. Change logging.level.root=WARN in production
# =====================================================
